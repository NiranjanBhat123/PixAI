spring:
  application:
    name: pixai-api
  data:
    mongodb:
      uri: mongodb://localhost:27017/pixai
  ai:
    mcp:
      client:
        enabled: false      # we create our own MCP client bean
  codec:
    max-in-memory-size: 10MB

pixai:
  mcp:
    server:
      url: http://localhost:8000   # base URL of our Python MCP server

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs